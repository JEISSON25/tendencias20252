<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bienvenido</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="max-w-4xl mx-auto p-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-4">
      ¡Hola, {{ nombre_usuario }}!
    </h1>
    <p class="text-gray-700 mb-4">
      Bienvenido al sistema de gestión de recursos.
    </p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
      <div class="bg-white shadow rounded-lg p-4">
        <h2 class="font-semibold text-lg mb-2">Tus reservas</h2>
        <p class="text-sm text-gray-600">
          Desde el menú de la izquierda puedes ver y gestionar tus reservas.
        </p>
      </div>

      <div class="bg-white shadow rounded-lg p-4">
        <h2 class="font-semibold text-lg mb-2">Historial</h2>
        <p class="text-sm text-gray-600">
          Consulta el historial de tus movimientos en el módulo de Historial.
        </p>
      </div>
    </div>
  </div>
</body>
</html>
