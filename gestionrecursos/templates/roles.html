<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Roles</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

  <h1 class="text-2xl font-bold mb-4">🧩 Lista de Roles</h1>
  <button onclick="window.location.href='/home/'" class="bg-gray-600 text-white px-4 py-2 rounded mb-4">⬅ Volver</button>

  <table class="min-w-full bg-white border rounded-lg shadow">
    <thead>
      <tr class="bg-blue-600 text-white">
        <th class="px-4 py-2">ID</th>
        <th class="px-4 py-2">Nombre del Rol</th>
        <th class="px-4 py-2">Descripcion</th>
      </tr>
    </thead>
    <tbody id="rolesBody"></tbody>
  </table>

  <script>
    const token = sessionStorage.getItem('accessToken');
    if (!token) window.location.href = '/login/';

    async function cargarRoles() {
      const response = await fetch('/api/roles/', {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) {
        console.error('Error al obtener los roles');
        return;
      }

      const data = await response.json();
      const tbody = document.getElementById('rolesBody');
      tbody.innerHTML = '';

      data.forEach(rol => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="border px-4 py-2">${rol.id_rol}</td>
          <td class="border px-4 py-2">${rol.nombre_rol}</td>
          <td class="border px-4 py-2">${rol.descripcion_rol}</td>
        `;
        tbody.appendChild(row);
      });
    }

    cargarRoles();
  </script>
</body>
</html>
